quarkus.datasource.db-kind = postgresql
quarkus.datasource.username = postgres
quarkus.datasource.password = 123456
quarkus.datasource.jdbc.url = jdbc:postgresql://localhost:5432/eventos

quarkus.http.test-port=8082

quarkus.hibernate-orm.database.generation=drop-and-create

quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true


quarkus.openapi-generator.codegen.spec.openapi_yml.model-name-prefix=QuarkusOpenApiGenerator
quarkus.openapi.generator.spec=openapi.yml

mp.jwt.verify.issuer=unitins-jwt
# # Token
mp.jwt.verify.publickey.location=token/publicKey.pem
smallrye.jwt.sign.key.location=token/privateKey.pem

# MinIO (usado pelo S3ClientProducer)
minio.endpoint=http://localhost:9000
minio.region=us-east-1
minio.access-key=admin
minio.secret-key=password
minio.path-style=true

# Habilita CORS globalmente
quarkus.http.cors=true

# Permite TODAS as origens (qualquer domínio pode acessar)
quarkus.http.cors.origins=*

# Métodos HTTP permitidos
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH

# Headers permitidos
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,origin

# Permite credenciais (cookies, autenticação)
quarkus.http.cors.access-control-allow-credentials=true

# Tempo que o browser pode cachear a resposta CORS (24 horas)
quarkus.http.cors.access-control-max-age=24H