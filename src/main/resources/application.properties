# ══════════════════════════════════════════════════════════════
# PERFIL PADRÃO — Desenvolvimento local (./mvnw quarkus:dev)
# ══════════════════════════════════════════════════════════════
quarkus.datasource.db-kind=mariadb
quarkus.datasource.username=${DB_USER:root}
quarkus.datasource.password=${DB_PASSWORD:123456}
quarkus.datasource.jdbc.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:eventos}

quarkus.http.test-port=8082

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true

quarkus.openapi-generator.codegen.spec.openapi_yml.model-name-prefix=QuarkusOpenApiGenerator
quarkus.openapi.generator.spec=openapi.yml

mp.jwt.verify.issuer=unitins-jwt
mp.jwt.verify.publickey.location=token/publicKey.pem
smallrye.jwt.sign.key.location=token/privateKey.pem

# Swagger UI disponível em todos os perfis (inclusive docker/produção)
quarkus.swagger-ui.always-include=true

minio.endpoint=http://localhost:9000
minio.region=us-east-1
minio.access-key=admin
minio.secret-key=password
minio.path-style=true

# ══════════════════════════════════════════════════════════════
# PERFIL DOCKER — Ativado via QUARKUS_PROFILE=docker
# Os serviços se comunicam pelos nomes do docker-compose (db, minio)
# ══════════════════════════════════════════════════════════════
%docker.quarkus.datasource.db-kind=mariadb
%docker.quarkus.datasource.jdbc.url=jdbc:mariadb://${DB_HOST:db}:${DB_PORT:3306}/${DB_NAME:eventos}
%docker.quarkus.datasource.username=${DB_USER:root}
%docker.quarkus.datasource.password=${DB_PASSWORD:123456}

%docker.minio.endpoint=http://minio:9000
%docker.minio.access-key=admin
%docker.minio.secret-key=password
%docker.minio.region=us-east-1

# Desativa logs verbosos de SQL no perfil docker
%docker.quarkus.hibernate-orm.log.sql=false
%docker.quarkus.hibernate-orm.log.bind-parameters=false

# Habilita CORS globalmente
quarkus.http.cors=true

# Permite TODAS as origens (qualquer domínio pode acessar)
quarkus.http.cors.origins=*

# Métodos HTTP permitidos
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH

# Headers permitidos
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,origin

# Permite credenciais (cookies, autenticação)
quarkus.http.cors.access-control-allow-credentials=true

# Tempo que o browser pode cachear a resposta CORS (24 horas)
quarkus.http.cors.access-control-max-age=24H